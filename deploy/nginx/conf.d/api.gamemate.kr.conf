upstream nangman_asgi {
    server web:8000;
}

# HTTP — ACME challenge + HTTPS로 리다이렉트
server {
    listen 80;
    listen [::]:80;
    server_name api.gamemate.kr;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — 인증서 발급 후 활성화됨 (없으면 nginx가 시작 실패할 수 있음)
# 최초 SSL 발급 전에는 deploy/nginx/conf.d/00-http-only.conf.template 참고
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name api.gamemate.kr;

    ssl_certificate     /etc/letsencrypt/live/api.gamemate.kr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.gamemate.kr/privkey.pem;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    location /static/ {
        alias /var/www/static/;
        expires 7d;
        access_log off;
    }

    location /media/ {
        alias /var/www/media/;
        expires 7d;
    }

    location / {
        proxy_pass http://nangman_asgi;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }
}
